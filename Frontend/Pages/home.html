<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBD Streak Tracker</title>
    <link rel="icon" type="image/x-icon" href="/Images/Miscellaneous/Logo_DBD.ico">
    <link rel="stylesheet" href="/CSS/home.css" />
</head>

<body data-page="home">
    <h1>Dead by Daylight Streak Tracker</h1>
    <h4 id="welcomeUser"></h4>

    <div id="roleContainer">
        <h2 id="roleTitle">Select Role</h2>

        <div class="roleSelection">
            <button class="roleButton" data-role="survivor">Survivor</button>
            <button class="roleButton" data-role="killer">Killer</button>
        </div>
    </div>

    <div id="modeContainer" class="hidden">
        <h2 id="modeTitle">Select Mode</h2>

        <div class="perkGrid" id="survivorModes">
            <div class="row center">
                <button class="streakButton" data-mode="solo">
                    <img src="/Images/Miscellaneous/Perk_Overcome.png" />
                </button>
            </div>

            <div class="row spread">
                <button class="streakButton" data-mode="duo">
                    <img src="/Images/Miscellaneous/Perk_TeamworkCollectiveStealth.png" />
                </button>

                <button class="streakButton" data-mode="trio">
                    <img src="/Images/Miscellaneous/Perk_BloodEcho.png" />
                </button>
            </div>

            <div class="row center">
                <button class="streakButton" data-mode="squad">
                    <img src="/Images/Miscellaneous/Perk_ProveThyself.png" />
                </button>
            </div>
        </div>

        <div class="perkGrid hidden" id="killerMode">
            <button class="killerButton">
                    <img src="/Images/Miscellaneous/Perk_NoOneEscapesDeath.png" />
            </button>
        </div>
    </div>

    <script type="module" src="/JS/app.js"></script>
</body>

</html>
