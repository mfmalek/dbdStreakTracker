<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBD Escape Streak Tracker - Trio</title>
    <link rel="icon" type="image/x-icon" href="/Images/Miscellaneous/Logo_DBD.ico">
    <link rel="stylesheet" href="/CSS/streakCore.css">
    <link rel="stylesheet" href="/CSS/streakLayout.css">
    <link rel="stylesheet" href="/CSS/streakComponents.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet" />
</head>

<body data-page="streak" data-mode="trio">
    <div id="loadingScreen">Loading...</div>
    
    <div id="navbar">
        <div class="navLeft">
            <span id="navLogo">DBD Tracker</span>
            <button id="homeButton">Home</button>
        </div>

        <div class="navCenter">
            <span id="modeIndicator"></span>
        </div>

        <div class="navRight">
            <span id="welcomeUser"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </div>

    <div id="titleAndRules">
        <h1 id="streakTitle"></h1>
        <div id="ruleset"></div>
    </div>

    <div class="matchEntry">
        <div id="survivorContainer"></div>

        <div class="column">
            <div class="nickAndChar" id="killerInfo">
                <h2 class="nickname">Killer</h2>
                <img class="characterPortrait" id="killerImage" src="/Images/Miscellaneous/Icon_Killer.png" alt="Killer"
                    title="Killer">
            </div>
            <div class="perkBuilder">
                <div class="card">
                    <h2 class="perkBuilderTitle">Killer's build</h2>
                    <div class="perkSlots">
                        <div class="perkSlot" id="killerPerkSlot1">
                            <label for="killerPerk1" class="perkNumberText">Perk 1:</label>
                            <select id="killerPerk1"></select>
                        </div>
                        <div class="perkSlot" id="killerPerkSlot2">
                            <label for="killerPerk2" class="perkNumberText">Perk 2:</label>
                            <select id="killerPerk2"></select>
                        </div>
                        <div class="perkSlot" id="killerPerkSlot3">
                            <label for="killerPerk3" class="perkNumberText">Perk 3:</label>
                            <select id="killerPerk3"></select>
                        </div>
                        <div class="perkSlot" id="killerPerkSlot4">
                            <label for="killerPerk4" class="perkNumberText">Perk 4:</label>
                            <select id="killerPerk4"></select>
                        </div>
                    </div>
                    <div class="mapImageSection">
                        <img id="mapImage" src="/Images/Maps/Map_GenericMapBackground.png" alt="DBD Map">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="infoAndStats" class="bottomInfo">
        <div id="matchInfoSection">
            <h2>Match Info</h2>
            <div id="mapAndKiller">
                <div class="inputGroup">
                    <label for="killerName">Killer:</label>
                    <select id="killerName" placeholder="Select Killer"></select>
                </div>
                <div class="inputGroup">
                    <label>Map:</label>
                    <select id="mapName" placeholder="Select Map"></select>
                </div>
            </div>

            <div class="bottomButtons">
                <button id="submitMatchButton">Submit Match</button>
                <button id="clearMatchesButton">Clear All Matches</button>
                <div id="deleteMatch">
                    <input type="number" id="deleteMatchNumber" placeholder="Match #" min="1">
                    <button id="deleteMatchButton">Delete Match</button>
                </div>
            </div>
        </div>

        <div id="streakStatsSection">
            <h2>Streak Stats</h2>
            <div id="streakStats">
                <h3>🔥 Current Streak: <span id="currentStreak"></span></h3><br>
                <h3>🏆 Best Streak: <span id="bestStreak"></span></h3>
            </div>
            <button class="bottomButtons" id="resetBestStreakButton">Reset Best Streak</button>
        </div>

        <div id="groupSection">
            <h2>Group</h2>

            <div class="inviteControls">
                <input type="text" id="inviteUsername" placeholder="Enter username" />
                <button id="inviteButton">Invite</button>
            </div>

            <div id="invitesList">
                <h3>Pending Invites</h3>
                <ul id="invitesContainer"></ul>
            </div>
        </div>
    </div>

    <table id="matchTable">
        <thead></thead>
        <tbody id="matchTableBody"></tbody>
    </table>

    <script type="module" src="/JS/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
</body>

</html>
